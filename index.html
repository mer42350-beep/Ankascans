<html lang="tr">
<head>

    <style>
        /* ANKASCANS TARZI MODERN WEB AYARLARI */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background-color: #1A1423; /* Derin Soluk Mor */
            color: #E2DDF0;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ÜST BAR (NAVBAR) */
        header {
            background-color: #231A30; /* Soluk Mat Mor */
            padding: 0 5%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #C4B065; /* Soluk Altın Sarı */
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #C4B065;
            letter-spacing: 1px;
        }

        .nav-menu {
            display: flex;
            gap: 25px;
            list-style: none;
            font-weight: 600;
            font-size: 15px;
            color: #AFA4C4;
        }

        .nav-menu a:hover, .nav-menu .active {
            color: #C4B065;
        }

        .search-box input {
            background-color: #1A1423;
            border: 1px solid #4E4166;
            padding: 8px 16px;
            border-radius: 4px;
            color: #FFF;
            outline: none;
            width: 220px;
            transition: 0.3s;
        }

        .search-box input:focus {
            border-color: #C4B065;
            width: 260px;
        }

        /* ANA İÇERİK YAPISI */
        .main-layout {
            padding: 40px 5%;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 40px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #231A30;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 800;
            color: #FFF;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 60px;
            height: 2px;
            background-color: #C4B065;
        }

        /* DİNAMİK UPDATE LİSTESİ */
        .updates-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .update-item {
            background-color: #231A30;
            border-radius: 6px;
            padding: 12px;
            display: flex;
            gap: 15px;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .update-item:hover {
            border-color: #C4B065;
            transform: translateY(-2px);
        }

        .mini-cover {
            width: 75px;
            height: 100px;
            background-color: #4E4166;
            border-radius: 4px;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
        }

        .series-meta {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            width: 100%;
        }

        .series-name {
            font-weight: 700;
            font-size: 15px;
            color: #FFF;
            line-height: 1.3;
            margin-bottom: 8px;
        }

        .chapters-links {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chapter-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1A1423;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
        }

        .chapter-row:hover {
            background-color: #4E4166;
            color: #FFF;
        }

        .chapter-time {
            font-size: 11px;
            color: #786C8E;
        }

        /* SAĞ SİDEBAR */
        .sidebar-panel {
            background-color: #231A30;
            border-radius: 6px;
            padding: 20px;
            height: fit-content;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #FFF;
            border-left: 3px solid #C4B065;
            padding-left: 8px;
        }

        .discord-widget {
            background-color: #5865F2;
            color: #FFF;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }

        /* YÖNETİCİ BÖLÜM EKLEME PANELİ */
        .admin-panel {
            margin: 40px 5%;
            background-color: #231A30;
            border: 2px dashed #C4B065;
            border-radius: 8px;
            padding: 25px;
        }

        .admin-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #C4B065;
        }

        .admin-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 12px;
            color: #AFA4C4;
        }

        .form-group input {
            background-color: #1A1423;
            border: 1px solid #4E4166;
            padding: 10px;
            border-radius: 4px;
            color: #FFF;
            outline: none;
        }

        .form-group input:focus {
            border-color: #C4B065;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }

        .btn-primary {
            background-color: #C4B065;
            color: #1A1423;
        }

        .btn-primary:hover {
            background-color: #E2DDF0;
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
